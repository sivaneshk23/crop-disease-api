services:
  - type: web
    name: crop-disease-api
    env: python
    buildCommand: |
      echo "Starting build..."
      pip install --upgrade pip
      pip install -r requirements.txt
      echo "Installing gdown for Google Drive downloads..."
      pip install gdown
      echo "Downloading model from Google Drive..."
      gdown --fuzzy "https://drive.google.com/file/d/1VHpLqVjFbGqLzQzLzLzLzLzLzLzLzL/view" -O model.pth || echo "If this fails, replace the URL with your actual Google Drive link"
      ls -lah model.pth
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
