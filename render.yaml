services:
  - type: web
    name: crop-disease-api
    env: python
    buildCommand: |
      pip install -r requirements.txt
      echo "Downloading model from GitHub Release..."
      curl -L -H "Accept: application/octet-stream" -o model.pth https://github.com/sivaneshk23/crop-disease-api/releases/download/v1.0.0/model.pth
      if [ -f model.pth ]; then
        echo "✅ Model downloaded successfully! Size: $(ls -lh model.pth | awk '{print $5}')"
      else
        echo "❌ Model download failed!"
        exit 1
      fi
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
